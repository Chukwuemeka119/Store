<!DOCTYPE html>
<html>
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar"><h2>Inventory</h2><div class="nav-links"><a href="index.html">Home</a><a href="#" onclick="logout()">Logout</a></div></nav>
