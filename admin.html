<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 id="c-name"></h2>
<p id="c-address"></p>
<p id="c-phone"></p>
<hr>
<h2>Settings</h2><br>
<input id="company-name" placeholder="Company Name">
<input id="company-address" placeholder="Address">
<input id="company-phone" placeholder="Phone">
<button onclick="saveCompany()">Save Company</button>
<h2>Change Password</h2>
<label for="old-password">Old Password:</label>
<input type="password" id="old-password" placeholder="Old Password">
<label for="new-password">New Password:</label>
<input type="password" id="new-password" placeholder="New Password">
<label for="confirm-password">Confirm Password:</label>
<input type="password" id="confirm-password" placeholder="Confirm Password">
<button id="change-password-btn">Change Password</button>
<hr>
<h2>Sales History</h3>
<button onclick="logout()">Logout</button>

<table>
<thead><tr><th>Item</th><th>Qty</th><th>Total</th><th>Date</th></tr></thead>
<tbody id="history-body"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
