<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MW™ — Create Business Account</title>
<meta name="robots" content="noindex,nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:#0a0a0f;color:#e8e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(124,106,255,0.15),transparent)}
.wrap{width:100%;max-width:520px}
h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#7c6aff,#ff6a9b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.sub{font-size:0.72rem;color:#6b6b88;margin-bottom:32px}
.card{background:#13131a;border:1px solid #2a2a3a;border-radius:20px;padding:28px;margin-bottom:16px}
.section-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.12em;color:#6b6b88;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:#6b6b88}
input{font-family:'DM Mono',monospace;font-size:0.85rem;background:#1c1c26;border:1px solid #2a2a3a;color:#e8e8f0;padding:11px 14px;border-radius:12px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;width:100%}
input:focus{border-color:#7c6aff;box-shadow:0 0 0 3px rgba(124,106,255,0.15)}
input::placeholder{color:#6b6b88}
.btn{font-family:'DM Mono',monospace;font-size:0.78rem;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;border:none;border-radius:12px;padding:12px 22px;transition:all 0.2s;width:100%}
.btn-primary{background:linear-gradient(135deg,#7c6aff,#9b8aff);color:#fff;box-shadow:0 4px 20px rgba(124,106,255,0.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,106,255,0.5)}
.btn-danger{background:rgba(255,77,109,0.12);color:#ff4d6d;border:1px solid rgba(255,77,109,0.25);margin-top:8px}
.btn-danger:hover{background:rgba(255,77,109,0.22)}
#status{margin-top:16px;padding:14px 18px;border-radius:12px;font-size:0.78rem;display:none}
.status-ok{background:rgba(106,255,212,0.1);border:1px solid rgba(106,255,212,0.25);color:#6affd4}
.status-err{background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.25);color:#ff4d6d}
.biz-list{margin-top:24px}
.biz-item{background:#13131a;border:1px solid #2a2a3a;border-radius:12px;padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.biz-code{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:#7c6aff}
.biz-name{font-size:0.78rem;color:#e8e8f0}
.biz-status-active{font-size:0.62rem;color:#6affd4;border:1px solid rgba(106,255,212,0.3);background:rgba(106,255,212,0.08);padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:0.1em}
.biz-status-inactive{font-size:0.62rem;color:#ff4d6d;border:1px solid rgba(255,77,109,0.3);background:rgba(255,77,109,0.08);padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:0.1em}
.toggle-btn{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.08em;text-transform:uppercase;background:transparent;border:1px solid #2a2a3a;color:#6b6b88;padding:5px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s}
.toggle-btn:hover{border-color:#7c6aff;color:#7c6aff}
.gate{background:#13131a;border:1px solid #2a2a3a;border-radius:20px;padding:32px;margin-bottom:16px}
.gate h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:16px;color:#e8e8f0}
</style>
</head>
<body>
<div class="wrap">
  <h1>MW™ Business Manager</h1>
  <p class="sub">Create and manage StockSavvy business accounts</p>

  <!-- OWNER LOGIN GATE -->
  <div class="gate" id="gate">
    <h2>🔐 Owner Access</h2>
    <div class="field">
      <label>Owner Password</label>
      <input type="password" id="owner-pass" placeholder="••••••••"/>
    </div>
    <button class="btn btn-primary" id="gate-btn">Enter →</button>
    <div id="gate-err" style="color:#ff4d6d;font-size:0.72rem;margin-top:10px;display:none">Wrong password</div>
  </div>

  <div id="main" style="display:none">
    <!-- CREATE BUSINESS -->
    <div class="card">
      <div class="section-label">Create New Business Account</div>

      <div class="field">
        <label>Business Code (unique ID)</label>
        <input id="new-bizcode" placeholder="e.g. SHOP001" style="text-transform:uppercase"/>
      </div>
      <div class="field">
        <label>Store Name</label>
        <input id="new-bizname" placeholder="e.g. Mummy Aka Shop"/>
      </div>
      <div class="field">
        <label>Address</label>
        <input id="new-bizaddr" placeholder="e.g. Abuja, Nigeria"/>
      </div>
      <div class="field">
        <label>Phone</label>
        <input id="new-bizphone" placeholder="e.g. 08012345678"/>
      </div>
      <div class="field">
        <label>Admin Password (for this business)</label>
        <input id="new-adminpass" type="password" placeholder="min. 4 characters"/>
      </div>

      <button class="btn btn-primary" id="create-btn" style="margin-top:8px">+ Create Business Account</button>
      <div id="status"></div>
    </div>

    <!-- EXISTING BUSINESSES -->
    <div class="card">
      <div class="section-label">Existing Business Accounts</div>
      <div id="biz-list"><div style="color:#6b6b88;font-size:0.78rem">Loading...</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ── Change this to your own secret owner password ──
const OWNER_PASSWORD = 'mwowner2026';

const firebaseConfig = {
  apiKey: "AIzaSyAF7q176rxAoCFqhH0Djquhu0MphaUMLyQ",
  authDomain: "pos-store-29e58.firebaseapp.com",
  databaseURL: "https://pos-store-29e58-default-rtdb.firebaseio.com",
  projectId: "pos-store-29e58",
  storageBucket: "pos-store-29e58.firebasestorage.app",
  messagingSenderId: "494046387333",
  appId: "1:494046387333:web:44ef67eeac8e40e4f19dec"
};

const app = initializeApp(firebaseConfig, 'setup');
const db  = getDatabase(app);
const $   = id => document.getElementById(id);

// ── GATE ──────────────────────────────────────────
$('gate-btn').addEventListener('click', () => {
  if ($('owner-pass').value === OWNER_PASSWORD) {
    $('gate').style.display = 'none';
    $('main').style.display = 'block';
    loadBusinesses();
  } else {
    $('gate-err').style.display = 'block';
    $('owner-pass').value = '';
    setTimeout(() => $('gate-err').style.display = 'none', 3000);
  }
});
$('owner-pass').addEventListener('keydown', e => { if (e.key === 'Enter') $('gate-btn').click(); });

// ── CREATE BUSINESS ───────────────────────────────
$('create-btn').addEventListener('click', async () => {
  const bizId    = $('new-bizcode').value.trim().toUpperCase();
  const name     = $('new-bizname').value.trim();
  const address  = $('new-bizaddr').value.trim();
  const phone    = $('new-bizphone').value.trim();
  const adminPw  = $('new-adminpass').value.trim();

  if (!bizId || !name || !address || !phone || !adminPw) {
    showStatus('Please fill in all fields.', false); return;
  }
  if (adminPw.length < 4) { showStatus('Admin password must be at least 4 characters.', false); return; }

  // Check if code already exists
  const snap = await get(ref(db, `businesses/${bizId}`));
  if (snap.exists()) { showStatus(`Business code "${bizId}" already exists. Choose a different code.`, false); return; }

  // Create business
  await set(ref(db, `businesses/${bizId}`), {
    config: {
      adminPassword: adminPw,
      active: true,
      createdAt: new Date().toISOString(),
    },
    business: { name, address, phone }
  });

  showStatus(`✓ Business "${name}" created! Code: ${bizId} | Admin password: ${adminPw}`, true);
  $('new-bizcode').value = $('new-bizname').value = $('new-bizaddr').value = $('new-bizphone').value = $('new-adminpass').value = '';
  loadBusinesses();
});

function showStatus(msg, ok) {
  const el = $('status');
  el.textContent = msg;
  el.className = ok ? 'status-ok' : 'status-err';
  el.style.display = 'block';
  if (ok) setTimeout(() => el.style.display = 'none', 6000);
}

// ── LOAD BUSINESSES ───────────────────────────────
async function loadBusinesses() {
  const snap = await get(ref(db, 'businesses'));
  const data = snap.val() || {};
  const list = $('biz-list');

  const entries = Object.entries(data);
  if (entries.length === 0) {
    list.innerHTML = '<div style="color:#6b6b88;font-size:0.78rem">No businesses yet</div>';
    return;
  }

  list.innerHTML = entries.map(([id, biz]) => {
    const active = biz.config?.active !== false;
    const name   = biz.business?.name || '—';
    const phone  = biz.business?.phone || '—';
    return `<div class="biz-item">
      <div>
        <div class="biz-code">${id}</div>
        <div class="biz-name">${name} · ${phone}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="${active ? 'biz-status-active' : 'biz-status-inactive'}">${active ? 'Active' : 'Inactive'}</span>
        <button class="toggle-btn" onclick="toggleBusiness('${id}', ${active})">${active ? 'Deactivate' : 'Activate'}</button>
      </div>
    </div>`;
  }).join('');
}

window.toggleBusiness = async (id, currentlyActive) => {
  const action = currentlyActive ? 'deactivate' : 'activate';
  if (!confirm(`${action.charAt(0).toUpperCase() + action.slice(1)} business "${id}"?`)) return;
  await update(ref(db, `businesses/${id}/config`), { active: !currentlyActive });
  loadBusinesses();
};
</script>
</body>
</html>
