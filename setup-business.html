<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>MW Owner Panel</h2>
        <input type="password" id="owner-pass" placeholder="Owner Pass">
        <button id="unlock">Unlock</button>
    </div>
    <div id="manager" style="display:none">
        <div class="card">
            <h3>New Business</h3>
            <input id="new-id" placeholder="ID (e.g. SHOP01)">
            <input id="new-name" placeholder="Store Name">
            <button id="create">Register</button>
        </div>
        <div id="biz-list"></div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
