
<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MW™ Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-gate" class="card" style="max-width:400px; margin: 50px auto;">
        <h2>Owner Login</h2>
        <input type="password" id="m-pass" placeholder="Enter Owner Password">
        <button id="btn-gate">Unlock Manager</button>
    </div>

    <div id="panel" style="display:none">
        <div class="card">
            <h3>Register New Store</h3>
            <input id="n-id" placeholder="Business ID (e.g. SHOP01)">
            <input id="n-name" placeholder="Store Name">
            <input id="n-pass" type="password" placeholder="Admin Password">
            <button id="btn-create">Create & Activate</button>
        </div>

        <div class="card">
            <h3>Manage Accounts</h3>
            <div id="list">Loading businesses...</div>
        </div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const conf = {
  apiKey: "AIzaSyAF7q176rxAoCFqhH0Djquhu0MphaUMLyQ",
  authDomain: "pos-store-29e58.firebaseapp.com",
  databaseURL: "https://pos-store-29e58-default-rtdb.firebaseio.com",
  projectId: "pos-store-29e58",
  appId: "1:494046387333:web:44ef67eeac8e40e4f19dec"
};
const app = initializeApp(conf, 'manager');
const db = getDatabase(app);

const $ = i => document.getElementById(i);

// Globalize functions for mobile browsers
window.handlePaid = async (id) => {
    const d = document.getElementById(`date-${id}`).value;
    if(!d) return alert("Select date first");
    await update(ref(db, `businesses/${id}/config`), { 
        lastPaymentDate: new Date(d).toISOString(), 
        active: true 
    });
    render();
};

window.handleToggle = async (id, currentStatus) => {
    await update(ref(db, `businesses/${id}/config`), { active: !currentStatus });
    render();
};

$('btn-gate').onclick = () => {
    if($('m-pass').value === 'mwowner2026') {
        $('auth-gate').style.display='none';
        $('panel').style.display='block';
        render();
    } else { alert("Access Denied"); }
};

async function render() {
    try {
        const snap = await get(ref(db, 'businesses'));
        const data = snap.val() || {};
        const listDiv = $('list');
        listDiv.innerHTML = '';
        
        Object.entries(data).forEach(([id, biz]) => {
            const active = biz.config.active !== false;
            const item = document.createElement('div');
            item.className = 'card';
            item.style.borderLeft = active ? '4px solid var(--success)' : '4px solid var(--danger)';
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px">
                    <div><b>${id}</b><br><small>${biz.business?.name || 'Store'}</small></div>
                    <span style="color:${active?'var(--success)':'var(--danger)'}">${active?'ACTIVE':'OFF'}</span>
                </div>
                <input type="date" id="date-${id}" value="${biz.config.lastPaymentDate?.split('T')[0] || ''}">
                <div style="display:flex; gap:10px">
                    <button onclick="handlePaid('${id}')" style="background:var(--success); color:#000">Set Paid</button>
                    <button onclick="handleToggle('${id}', ${active})" style="background:${active?'var(--danger)':'var(--accent)'}">${active?'Kill':'Wake'}</button>
                </div>`;
            listDiv.appendChild(item);
        });
    } catch(e) { listDiv.innerHTML = "Permission Denied. Update Firebase Rules."; }
}

$('btn-create').onclick = async () => {
    const id = $('n-id').value.toUpperCase().trim();
    if(!id) return alert("Enter ID");
    await set(ref(db, `businesses/${id}`), {
        config: { adminPassword: $('n-pass').value, active: true, lastPaymentDate: new Date().toISOString() },
        business: { name: $('n-name').value }
    });
    render();
};
</script>
</body>
</html>
