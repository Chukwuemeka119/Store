<!DOCTYPE html>
<html>
<head>
<title>POS Sales</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2 id="c-name"></h2>
<p id="c-address"></p>
<p id="c-phone"></p>
<hr>

<input type="text" placeholder="Customer Name" id="cn">
<input type="number" placeholder="Customer Number" id="cnu">
<br>
<select id="sell-item"></select>
<input id="sell-qty" type="number" placeholder="Qty">
<button id="sell-btn">Add</button>
<button id="print-btn">Print Receipt</button>
<button onclick="logout()">Logout</button>

<table>
<thead><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr></thead>
<tbody id="sell-body"></tbody>
</table>

<h3>Subtotal: ₦<span id="subtotal">0</span></h3>
  <div id="receipt" style="display:none">

<h2 id="r-store"></h2>
<p id="r-address"></p>
<p id="r-phone"></p>

<hr>

<p>Cashier: <span id="r-cashier"></span></p>
<p>Date: <span id="r-date"></span></p>

<table>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>
</thead>

<tbody id="r-items"></tbody>

</table>

<hr>

<h3>Total: ₦<span id="r-total"></span></h3>

<p style="text-align:center">Thank you for shopping!</p>

</div>

<a href="inventory.html">Inventory</a> | <a href="admin.html">Admin</a>

<script src="script.js"></script>
</body>
</html>
